<div class="live-container">

  <!-- ESTADO: CARGANDO -->
  <div *ngIf="!isJoined" class="loading-overlay">
    <div class="spinner"></div>
    <p>Entrando al directo de {{ roomName }}...</p>
  </div>

  <!-- PANTALLA DE VIDEO -->
  <div *ngIf="isJoined" class="video-wrapper">

    <!-- Badge de "En Vivo" -->
    <div class="live-badge">
      <div class="dot"></div>
      <span>EN DIRECTO: {{ roomName }}</span>
    </div>

    <!-- 1. VIDEO LOCAL: Solo aparece si tú eres la que transmite (Modo Streamer) -->
    <video *ngIf="modo === 'streamer'" #localVideo autoplay playsinline muted></video>

    <!-- 2. VIDEO REMOTO: Solo aparece si eres espectador (Modo Viewer) -->
    <video *ngIf="modo === 'viewer'" #remoteVideo autoplay playsinline></video>

    <!-- Botones de Interacción -->
    <div class="controls-overlay">
      <button (click)="salir()" class="btn-exit">Salir</button>
    </div>

    <!-- Mensaje si no hay señal aún -->
    <div *ngIf="!conectado && modo === 'viewer'" class="no-signal">
      <p>Esperando señal de la streamer...</p>
    </div>
  </div>

</div>
