<div class="video-container" style="width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center;">
  @if (videoUrl) {
    <video
      [src]="videoUrl"
      controls
      autoplay
      style="width: 100%; height: 100%; object-fit: contain;">
    </video>
  } @else {
    <div style="color: white; font-family: sans-serif;">
      Esperando video...
    </div>
  }
</div>
