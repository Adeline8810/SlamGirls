<div class="live-viewer-container">
  <!-- Cabecera con info REAL del usuario -->
  <div class="live-header">
    <div class="user-info">
      <!-- Foto de perfil dinámica -->
      <div class="avatar-wrapper">
        <pre style="color: white; font-size: 10px;">{{ usuario | json }}</pre>
        <img [src]="usuario?.fotoUrl || usuario?.fotoPortada || 'assets/img/default-user.png'"
     class="user-avatar"
     style="width: 50px; height: 50px; border-radius: 50%;">
        <div class="live-tag">EN DIRECTO</div>
      </div>

      <div class="text-meta">
        <!-- Nombre real que viene de la base de datos -->
        <span class="username">{{ usuario?.username || 'Usuario ' + userId }}</span>
        <span class="viewers-count">👁️ 128 personas</span>
      </div>
    </div>
    <button class="btn-close" routerLink="/">×</button>
  </div>

  <!-- Contenedor del Video -->
  <div class="video-section">
    <!-- Este overlay solo se ve si NO hay señal -->
    <div class="video-overlay" *ngIf="!conectado">
      <div class="loading-spinner"></div>
      <p>Sincronizando con Adeline...</p>
      <small>ID de conexión: {{ userId }}</small>
    </div>

    <!-- Video de Ruth (Receptor) -->
<video #remoteVideo
       autoplay
       playsinline
       [muted]="true"
       style="width: 100%; height: 100%; object-fit: cover;">
</video>
  </div>

  <!-- Barra de interacción inferior -->
  <div class="live-footer">
    <input type="text" placeholder="Di algo lindo..." class="comment-input">
    <div class="actions">
      <button class="btn-gift">🎁</button>
      <button class="btn-heart">❤️</button>
    </div>
  </div>
</div>
