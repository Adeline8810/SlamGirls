<div class="auth-center">
  <h2>Iniciar sesión</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <input formControlName="username" placeholder="Usuario" />
    <input formControlName="password" type="password" placeholder="Contraseña" />
    <button type="submit">Entrar</button>
  </form>
  <button (click)="loginConGoogle()" class="btn-google">
  <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google">
  Continuar con Gmail
</button>
</div>
