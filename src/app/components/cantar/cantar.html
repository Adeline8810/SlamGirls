<!-- LA PISTA VA AQUÍ (Invisible) -->
<audio #pistaAudio src="assets/pistas/pista.mp3" preload="auto"></audio>

<div class="karaoke-screen">

  <!-- 1. Cabecera Minimalista (Icono X + Título) -->
  <div class="karaoke-header">
    <button class="btn-icon-close" (click)="irAtras()">✕</button>
  <div class="song-details">
  <!-- Si cancionSeleccionada tiene portada la usa, si no, usa una por defecto -->
  <img [src]="cancionSeleccionada?.url_portada || 'assets/img/default-cover.png'"
       class="mini-portada-circular"
       (error)="manejarErrorImagen($event)">

  <div class="textos-header">
    <span class="song-name">{{ cancionSeleccionada?.titulo || 'Cargando...' }}</span>
    <small class="artist-name">{{ cancionSeleccionada?.artista || 'Desconocido' }}</small>
  </div>
</div>
    <div class="header-spacer"></div>
  </div>

  <!-- 2. Área de Letras (Centrada y limpia) -->
  <div class="lyrics-container">
    <div class="lyrics-scroll">
      <!-- Letra anterior (opcional, en gris suave) -->
      <p class="letra-actual">{{ letraActual }}</p>
      <p class="letra-siguiente">{{ letraSiguiente }}</p>
    </div>
  </div>

  <!-- 3. Panel de Control Inferior -->
  <div class="bottom-controls">

    <!-- Selector de modo (Solo decorativo para igualar la imagen) -->
    <div class="mode-selector" *ngIf="!grabando">
      <span class="active">Solo</span>
      <span>Duo</span>
      <span>Groupe</span>
    </div>

    <!-- BOTÓN DINÁMICO -->
    <div class="action-button-container">
      <button *ngIf="!grabando" class="btn-action-pink" (click)="iniciar()">
        Appuyez pour commencer
      </button>

      <button *ngIf="grabando" class="btn-action-stop" (click)="finalizarCanto()">
        ⏹️ Finalizar y Guardar
      </button>
    </div>
  </div>

  <!-- 4. Overlay de carga -->
  <div class="loading-overlay" *ngIf="cargandoSubida">
    <div class="spinner-palo-rosa"></div>
    <p>Subiendo tu obra de arte...</p>
  </div>

  <!-- 5. Galería de Covers (Se oculta al grabar para no estorbar) -->
  <div class="covers-drawer" *ngIf="!grabando && listaDeCantos.length > 0">
    <h3 class="gallery-title">🎙️ Mis Covers Guardados</h3>
    <div class="grid-covers">
      <div *ngFor="let canto of listaDeCantos" class="card-audio">
        <audio controls class="mini-player">
          <source [src]="canto.urlAudio" type="audio/wav">
        </audio>
      </div>
    </div>
  </div>
</div>
