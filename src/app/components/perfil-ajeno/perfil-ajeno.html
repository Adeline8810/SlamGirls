<div class="profile-container" *ngIf="usuario()">
  <div class="header-bg" [style.background-image]="'url(' + usuario().fotoUrl + ')'"></div>

  <div class="profile-content">
    <button class="btn-back" (click)="volver()">❮</button>

    <div class="avatar-section">
      <img [src]="usuario().fotoUrl || 'assets/default-avatar.png'" class="main-avatar">
      <h2 class="display-name">{{ usuario().nombre }} 🇫🇷</h2>
      <p class="id-text">ID: {{ usuario().id }}</p>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <strong>188</strong>
        <span>Abonnés</span>
      </div>
      <div class="stat-item">
        <strong>16</strong>
        <span>Abonnements</span>
      </div>
      <div class="stat-item">
        <strong>417</strong>
        <span>Cadeaux</span>
      </div>
    </div>

    <div class="videos-container" style="margin: 20px 0; padding: 0 15px;">
      <h3 style="color: white; font-size: 1rem; margin-bottom: 10px;">Videos</h3>
      <div class="videos-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">

        @for (video of usuario().videos; track video) {
          <div class="video-item" style="border-radius: 10px; overflow: hidden; background: #000; height: 200px;">
            <iframe
              [src]="getSafeUrl(video)"
              style="width: 100%; height: 100%; border: none;"
              allowfullscreen>
            </iframe>
          </div>
        } @empty {
          <p style="color: #888; font-size: 0.8rem; grid-column: span 2; text-align: center;">
            Este usuario no tiene videos cargados.
          </p>
        }

      </div>
    </div>
    <div class="action-footer">
      <button class="btn-parler" (click)="irAlChat()">
        <span class="icon">🚀</span> parler
      </button>
      <button class="btn-amitie">
        <span class="icon">❤️</span> Amitié
      </button>
    </div>
  </div>
</div>
