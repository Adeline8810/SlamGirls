<div class="profile-container" *ngIf="usuario()">
  <div class="header-bg" [style.background-image]="'url(' + (usuario().fotoUrl || 'assets/img/default.png') + ')'"></div>

  <div class="profile-content">
    <img class="main-avatar" [src]="usuario().fotoUrl || 'assets/img/default.png'">
    <h2>{{ usuario().nombre }}</h2>
    <p class="id-text">ID: {{ usuario().id }}</p>

    <div class="tabs">
      <button (click)="selectedTab = 'videos'" [class.active]="selectedTab === 'videos'">Videos</button>
      <button (click)="selectedTab = 'info'" [class.active]="selectedTab === 'info'">Info</button>
    </div>

    <div class="tab-content-container">
      @if (selectedTab === 'videos') {
        <div class="video-grid">
          @for (video of videos; track video.id) {
            <div class="video-card" (click)="verVideo(video)">
              <video
                [src]="getSafeUrl(video.urlVideo)"
                class="video-preview"
                muted
                autoplay
                loop
                playsinline
                preload="auto">
              </video>
            </div>
          }
        </div>
      } @else {
        <div style="padding: 40px; color: #888;">
          <p>Próximamente más información de {{ usuario().nombre }}</p>
        </div>
      }
    </div>
  </div>

  <div class="action-footer">
    <button class="btn-parler">🚀 parler</button>
    <button class="btn-amitie">❤️ Amitié</button>
  </div>
</div>

@if (videoSeleccionado()) {
  <app-video-detail
    [video]="videoSeleccionado()"
    (close)="videoSeleccionado.set(null)">
  </app-video-detail>
}
