<div class="profile-container">
  <div class="header-bg" [style.background-image]="'url(' + (usuario().fotoUrl || 'assets/img/default.png') + ')'"></div>

  <div class="avatar-section">
    <div class="avatar-ring">
      <img [src]="usuario().fotoUrl || 'assets/img/default.png'" class="main-avatar">
    </div>
    <p class="profile-id">ID: {{ usuario().id }}</p>
  </div>

  <div class="tabs">
    <button (click)="changeTab('homepage')" [class.active]="selectedTab === 'homepage'">Homepage</button>
    <button (click)="changeTab('moment')" [class.active]="selectedTab === 'moment'">Moment</button>
    <button (click)="changeTab('likes')" [class.active]="selectedTab === 'likes'">Likes</button>
    <button (click)="changeTab('videos')" [class.active]="selectedTab === 'videos'">Videos</button>
    <button (click)="changeTab('album')" [class.active]="selectedTab === 'album'">Album</button>
  </div>

  <div class="video-grid-container" *ngIf="selectedTab === 'videos'">
   @for (video of videos; track video.id) {
    <div class="video-card" (click)="verVideo(video)">
      <video preload="metadata" class="video-preview">
        <source [src]="video.urlVideo" type="video/mp4">
      </video>
      <p class="video-title">{{ video.titulo }}</p>
    </div>
  }
  </div>

  <div class="action-footer">
   <button class="btn-parler" (click)="irAlChat()">🚀 parler</button>
    <button class="btn-amitie">❤️ Amitiéee</button>
  </div>
</div>

@if (videoSeleccionado()) {
  <app-video-detail
    [video]="videoSeleccionado()"
    (close)="videoSeleccionado.set(null)">
  </app-video-detail>
}
