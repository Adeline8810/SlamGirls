<!-- REPRODUCTOR (Referencia corregida a #pistaAudio) -->
<audio #pistaAudio
       [src]="pistaAudioUrl"
       crossOrigin="anonymous"
       (timeupdate)="(pasoActual === 1 && grabando) ? actualizarTiempo() : null">
</audio>


<div class="karaoke-screen" *ngIf="pasoActual === 1">


  <!-- CAPA DE VIDEO/FONDO (Nuevo para modo video) -->
<div class="karaoke-bg-layer">
  <video #previewVideo
         *ngIf="modoGrabacion === 'video'"
         autoplay
         muted
         playsinline
         class="camera-preview">
  </video>
</div>

  <!-- 1. CABECERA -->
  <div class="karaoke-header">
    <div class="close-btn" (click)="irAtras()">✕</div>
    <div class="song-info">
      {{ cancionSeleccionada ? cancionSeleccionada.titulo : 'Sincronizando...' }}
    </div>
    <div class="status-dot" [class.online]="!despertandoServidor"></div>
  </div>

  <div class="error-toast" *ngIf="errorCarga">
    Inténtalo de nuevo, el estudio está ocupado.
  </div>

  <!-- 2. VISOR DE LETRAS (Sincronizado con la base de datos) -->
  <div class="letras-container">
    <div *ngFor="let frase of frasesSincronizadas; let i = index"
         [class.activa]="i === indiceActivo"
         class="frase-karaoke">
      {{ frase.texto }}
    </div>
  </div>

  <!-- 3. CONTROLES DE GRABACIÓN -->
  <div class="bottom-controls">
    <div class="mode-selector-container" *ngIf="!grabando && !cargandoSubida && !publicadoConExito">
  <div class="mode-switch">
    <button [class.active]="modoGrabacion === 'audio'" (click)="cambiarModo('audio')">
      <span class="icon-mic">🎤</span>
    </button>
    <button [class.active]="modoGrabacion === 'video'" (click)="cambiarModo('video')">
      <span class="icon-video">📹</span>
    </button>
  </div>
</div>

   <button *ngIf="!grabando && !cargandoSubida && !publicadoConExito"
          class="btn-action-pink"
          (click)="iniciar()"
          [disabled]="despertandoServidor">
    {{ despertandoServidor ? 'Sincronizando estudio...' : 'Appuyez pour commencer' }}
  </button>

    <button *ngIf="grabando" class="btn-action-stop" (click)="finalizarCanto()">
    <span class="recording-dot"></span> ⏹ TERMINER
  </button>
  </div>

<div class="upload-overlay" *ngIf="cargandoSubida || publicadoConExito">
  <div class="upload-card">

    <!-- ESTADO: SUBIENDO -->
    <div *ngIf="cargandoSubida && !publicadoConExito">
      <div class="spinner-modern"></div>
      <h3>Publicando tu Cover</h3>
      <p>Preparando los últimos detalles...</p>

      <div class="progress-container-pro">
        <div class="progress-bar-fill" [style.width.%]="porcentajeSubida"></div>
      </div>
      <span class="percentage-text">{{ porcentajeSubida }}%</span>
    </div>

    <!-- ESTADO: ÉXITO -->
    <div *ngIf="publicadoConExito" class="success-anim">
      <div class="checkmark-circle">
        <div class="checkmark draw"></div>
      </div>
      <h3>¡Listo, Estrella!</h3>
      <p>Tu canción ya está en el estudio.</p>
    </div>

  </div>
</div>

</div>
