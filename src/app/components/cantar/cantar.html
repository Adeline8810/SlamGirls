<audio #pistaAudio preload="auto"></audio>
<div class="karaoke-screen">

  <!-- CABECERA COMÚN -->
  <div class="karaoke-header">
    <button class="btn-icon-close" (click)="irAtras()">✕</button>
    <span class="song-name">{{ cancionSeleccionada?.titulo }}</span>
  </div>

  <!-- PASO 1: GRABACIÓN (Solo se ve si pasoActual es 1) -->
  <div class="step-container" *ngIf="pasoActual === 1">
    <div class="lyrics-container">
      <p class="letra-actual">{{ letraActual }}</p>
      <p class="letra-siguiente">{{ letraSiguiente }}</p>
    </div>

    <div class="bottom-controls">
      <!-- Este texto desaparece cuando grabas gracias al *ngIf="!grabando" -->
      <div class="mode-selector" *ngIf="!grabando">
        <span class="active">Solo</span>
        <span>Duo</span>
      </div>

      <button *ngIf="!grabando" class="btn-action-pink" (click)="iniciar()">
        Appuyez pour commencer
      </button>

      <button *ngIf="grabando" class="btn-action-stop" (click)="finalizarCanto()">
        ⏹️ TERMINER
      </button>
    </div>
  </div>

  <!-- PASO 2: AJUSTES Y EFECTOS (Lo nuevo, basado en tu imagen) -->
  <div class="step-container edit-screen" *ngIf="pasoActual === 2">
    <div class="preview-mini-video">
       <img [src]="previewPortada || 'assets/img/default.png'">
       <button class="btn-change-media">Sélectionner un Média</button>
    </div>

    <div class="controls-card">
      <div class="tabs-edit">
        <span class="active">Modifier</span>
        <span>Modèles</span>
      </div>

      <div class="sliders-container">
        <div class="slider-row">
          <span>Voix</span>
          <input type="range" [(ngModel)]="volumenVoz" min="0" max="100">
          <span>{{volumenVoz}}</span>
        </div>
        <div class="slider-row">
          <span>Musique</span>
          <input type="range" [(ngModel)]="volumenMusica" min="0" max="100">
          <span>{{volumenMusica}}</span>
        </div>
      </div>

      <!-- BOTÓN PARA IR AL SIGUIENTE PASO -->
      <button class="btn-action-pink" (click)="irAPublicar()">Suivant</button>
    </div>
  </div>

  <!-- PASO 3: PUBLICAR (Pantalla final) -->
  <div class="step-container publish-screen" *ngIf="pasoActual === 3">
    <div class="publish-card">
      <div class="post-header">
        <textarea [(ngModel)]="descripcionPost" placeholder="Qu'est-ce qui vous preocupe?"></textarea>
        <div class="cover-upload" (click)="fotoInput.click()">
          <img [src]="previewPortada || 'assets/img/placeholder.png'">
          <div class="overlay">📷 Couverture</div>
          <input #fotoInput type="file" hidden (change)="onPortadaSeleccionada($event)">
        </div>
      </div>

      <!-- Opciones de compartir (decorativo) -->
      <div class="share-options">
         <p>Partager automatiquement sur</p>
         <div class="icons-row"> 🌐 📘 🐦 ✉️ </div>
      </div>
    </div>

    <div class="final-buttons">
      <button class="btn-save" (click)="guardarBorrador()">Sauvegarder</button>
      <button class="btn-action-pink" (click)="publicarTodo()">Publier</button>
    </div>
  </div>

  <div class="overlay-publicando" *ngIf="cargandoSubida">
  <div class="loader-content">
    <div class="spinner-karaoke"></div>
    <h2>Publicando...</h2>
    <div class="porcentaje-texto">{{ porcentajeSubida }}%</div>

    <div class="progress-bar-container">
      <div class="progress-bar-fill" [style.width.%]="porcentajeSubida"></div>
    </div>

    <p>Subiendo audio y mezclando efectos</p>
  </div>
</div>

</div>
