<!-- PANEL DE REGALOS DESLIZABLE (Overlay) -->
<div class="panel-inferior" *ngIf="panelActivo === 'regalos'" (click)="cerrarPaneles()">
  <div class="contenido-regalos" (click)="$event.stopPropagation()">
    <div class="header-panel">
      <span>Cadeau</span>
      <button (click)="cerrarPaneles()">✕</button>
    </div>

    <div class="grid-regalos">
      <!-- Aquí irían los iconos de Rosa, Micrófono, etc. -->
      <div class="regalo-item">
        <img src="assets/img/rose.png" alt="Rosa">
        <span>Rose</span>
        <small>3 🪙</small>
      </div>
      <!-- Repetir para los demás... -->
    </div>

    <div class="footer-panel">
      <button class="btn-enviar">Envoyer</button>
    </div>
  </div>
</div>
