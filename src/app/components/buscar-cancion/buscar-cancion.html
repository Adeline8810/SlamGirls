<div class="search-container">
  <!-- Barra de búsqueda -->
  <div class="search-header">
    <i class="fas fa-search"></i>
    <!-- Conectamos con tu variable terminoBusqueda y tu método filtrar() -->
    <input type="text"
           [(ngModel)]="terminoBusqueda"
           (input)="filtrar()"
           placeholder="Luz De Luna">
    <i class="fas fa-times" (click)="terminoBusqueda = ''; filtrar()"></i>
  </div>

  <div class="tabs">
    <span class="active">Tous</span>
    <span>Chansons</span>
    <span>Artiste</span>
  </div>

  <div class="results-section">
    <div class="section-title">
      <span>Chansons</span>
      <small>TOUT VOIR ></small>
    </div>

    <!-- Usamos cancionesFiltradas que es lo que maneja tu método filtrar() -->
    <div class="song-card" *ngFor="let cancion of cancionesFiltradas">
      <div class="song-image">
        <!-- Si no tienes urlPortada, ponemos una de disco por defecto -->
        <img [src]="cancion.urlPortada || 'assets/default-cover.jpg'" alt="Portada">
      </div>

      <div class="song-info">
        <h4 class="title">{{ cancion.titulo }}</h4>
        <div class="badges">
          <span class="badge-points">Points</span>
          <span class="artist-name">{{ cancion.artista }}</span>
        </div>
        <div class="stats">
          <i class="fas fa-microphone"></i> {{ cancion.id }}00 enregistrements
        </div>
      </div>

      <div class="song-action">
        <!-- El botón para ir a cantar usando el ID de la tabla -->
        <button [routerLink]="['/cantar', cancion.id]" class="btn-chanter">
          CHANTER
        </button>
      </div>
    </div>
  </div>
</div>
