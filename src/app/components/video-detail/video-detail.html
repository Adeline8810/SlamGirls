<div *ngIf="efectoActivo()" class="lanzamiento-efecto" (animationend)="limpiarEfecto()">
  <img [src]="efectoActivo()" alt="Regalo">
</div>

<div class="video-overlay">
  <div class="player-container">
    <button class="btn-back" (click)="close.emit()">❮</button>

    <div class="video-wrapper">
      <video [src]="video().urlVideo" autoplay controls></video>
      </div>

    <div class="gift-section">
      <div class="gift-tabs">
        <span class="active">Gift</span>
        <span>Activity</span>
        <span>Special</span>
      </div>

      <div class="gift-grid">
        @for (item of listaRegalos; track item.id) {
          <div class="gift-card"
               [class.selected]="regaloSeleccionado()?.id === item.id"
               (click)="seleccionarRegalo(item)">
            <img [src]="item.icon">
            <p>{{ item.nombre }}</p>
            <span>🪙 {{ item.precio }}</span>
          </div>
        }
      </div>
    </div>

    <div class="gift-footer">
      <div class="coin-balance">
        🪙 {{ misMonedas() }} <span class="arrow">❯</span>
      </div>
      <button class="btn-send" [disabled]="!regaloSeleccionado()" (click)="lanzarRegalo()">
        SEND
      </button>
    </div>
  </div>
</div>
