<div class="super-modal-overlay">
  <div class="celular-frame">

    <!-- Botón Volver (Flecha <) -->
    <button class="btn-back-starmaker" (click)="cerrar.emit()"> < </button>

    <!-- PARTE SUPERIOR: VIDEO Y LETRAS -->
   <div class="video-section">
  <!-- El nombre del atributo [videoUrl] debe coincidir con el @Input del TS -->
  <app-starmaker-player [videoUrl]="video?.urlVideo"></app-starmaker-player>

  <app-starmaker-lyrics></app-starmaker-lyrics>
</div>

    <!-- PARTE INFERIOR: PERFIL, TÍTULO Y ACCIONES -->
    <div class="info-section">
      <!-- Info del Usuario (Foto redonda y nombre) -->
      <div style="display: flex; align-items: center; gap: 10px;">
        <img [src]="video?.usuarioFoto || 'assets/img/default.png'" style="width: 40px; height: 40px; border-radius: 50%;">
        <span style="font-weight: bold; color: #ff2d55;">{{ video?.nombreUsuario || 'Usuario' }}</span>
      </div>

      <!-- Título del Video (Los hashtags azules de tus fotos) -->
      <p style="color: #2b7bb9; font-size: 14px; margin: 5px 0;">
        #{{ video?.titulo }} #StarMaker #Cover
      </p>

      <!-- Botones de Acción (Corazón, Comentario, Regalo) -->
      <div style="display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee;">
        <span>❤️ 209</span>
        <span>💬 5</span>
        <span>🎁 122</span>
        <button style="background: #ff2d55; color: white; border: none; border-radius: 20px; padding: 5px 15px;">Chanter</button>
      </div>

      <!-- Comentarios (Simulación) -->
      <div style="font-size: 13px; color: #555;">
        <strong>Ramène.ta:</strong> Je n'ai jamais entendu cette chanson...
      </div>
    </div>

  </div>
</div>
