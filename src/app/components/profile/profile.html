<div class="profile-container">

  <!-- HEADER -->
  <div class="header">
    <img class="avatar" src="https://via.placeholder.com/120" alt="avatar">

    <h2>Nombre Usuario</h2>
    <p>ID: 62150633454</p>

    <div class="stats">
      <div>
        <strong>7.9K</strong>
        <span>Followers</span>
      </div>
      <div>
        <strong>743</strong>
        <span>Following</span>
      </div>
      <div>
        <strong>718</strong>
        <span>Rank</span>
      </div>
      <div>
        <strong>40.5K</strong>
        <span>Gifts</span>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button (click)="changeTab('homepage')" [class.active]="selectedTab === 'homepage'">Homepage</button>
    <button (click)="changeTab('moment')" [class.active]="selectedTab === 'moment'">Moment</button>
    <button (click)="changeTab('likes')" [class.active]="selectedTab === 'likes'">Likes</button>
    <button (click)="changeTab('cover')" [class.active]="selectedTab === 'cover'">Cover</button>
    <button (click)="changeTab('collab')" [class.active]="selectedTab === 'collab'">Collab</button>
  </div>

  <!-- VIDEO GRID -->
  <div class="video-grid" *ngIf="selectedTab === 'cover'">
    <div class="video-card" *ngFor="let video of videos">
      <img [src]="video.thumbnail" alt="video">
      <p>{{ video.title }}</p>
    </div>
  </div>

</div>
