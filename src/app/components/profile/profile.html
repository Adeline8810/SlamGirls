<div class="profile-container">

  <div class="header">
    <div class="avatar-container" (click)="fileInput.click()">
      <img class="avatar" [src]="fotoUrlServidor" alt="avatar">
      <div class="edit-overlay">Editar</div>
    </div>

    <input #fileInput type="file" (change)="onFotoSeleccionada($event)" hidden accept="image/*">

    <h2>{{ nombreUsuario }}</h2>
    <p>ID: {{ usuarioId }}</p>

    <div class="stats">
      <div><strong>7.9K</strong><span>Followers</span></div>
      <div><strong>743</strong><span>Following</span></div>
      <div><strong>718</strong><span>Rank</span></div>
      <div><strong>40.5K</strong><span>Gifts</span></div>
    </div>
  </div>

  <div class="tabs">
    <button (click)="changeTab('homepage')" [class.active]="selectedTab === 'homepage'">Homepage</button>
    <button (click)="changeTab('moment')" [class.active]="selectedTab === 'moment'">Moment</button>
    <button (click)="changeTab('likes')" [class.active]="selectedTab === 'likes'">Likes</button>
    <button (click)="changeTab('videos')" [class.active]="selectedTab === 'videos'">Videos</button>
    <button (click)="changeTab('collab')" [class.active]="selectedTab === 'collab'">Album</button>
  </div>

<div class="video-grid" *ngIf="selectedTab === 'videos'">

<div class="video-card upload-box" (click)="videoInput.click()">
    <div class="plus-circle">
      <span style="color: #ff4d6d; font-weight: bold;">+</span>
    </div>
    <p style="color: #333; font-weight: 500;">Subir nuevo</p>
    <input #videoInput type="file" (change)="onVideoSeleccionado($event)" hidden accept="video/*">
  </div>

  <div class="video-card" *ngFor="let video of videos" (click)="reproducirVideo(video)">
    <div class="thumb-wrapper">
      <video [src]="video.urlVideo" class="video-preview"></video>
      <div class="play-icon">▶</div>
    </div>
    <p class="video-title">{{ video.titulo }}</p>
  </div>

</div>

</div>
