<div class="profile-container" *ngIf="usuario()">
  <div class="header">
    <div class="avatar-container">
      <img class="avatar"
           [src]="usuario().fotoUrl || 'assets/img/default.png'"
           alt="avatar">
    </div>
    <h2>{{ usuario().nombre }}</h2>
    <p>ID: {{ usuario().id }}</p>
  </div>

  <div class="tabs">
    <button (click)="selectedTab = 'homepage'" [class.active]="selectedTab === 'homepage'">Homepage</button>
    <button (click)="selectedTab = 'moment'" [class.active]="selectedTab === 'moment'">Moment</button>
    <button (click)="selectedTab = 'videos'" [class.active]="selectedTab === 'videos'">Videos</button>
  </div>

  <div class="tab-content" *ngIf="selectedTab === 'videos'">
    <div class="video-grid">
      @for (video of videos; track video.id) {
        <div class="video-card" (click)="verVideo(video)">
          <div class="thumb-wrapper">
            <video [src]="video.urlVideo" class="video-preview" muted preload="auto"></video>
          </div>
          <p class="video-title">{{ video.titulo }}</p>
        </div>
      } @empty {
        <p class="empty-msg">Aún no hay videos subidos.</p>
      }
    </div>
  </div>

  <div class="action-footer">
    <button class="btn-parler">🚀 parler</button>
    <button class="btn-amitie">❤️ Amitié</button>
  </div>
</div>
