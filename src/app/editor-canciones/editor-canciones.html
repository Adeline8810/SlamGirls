<div class="editor-main-container">
  <header class="editor-header">
    <h1>Sincronizador de Letras</h1>
    <p>Paso 1: Configuración de la canción</p>
  </header>

  <div class="editor-card">
    <!-- Área de la Letra -->
    <div class="input-group">
      <label>Letra de la canción</label>
      <textarea
        [(ngModel)]="letraBruta"
        placeholder="Pega la letra aquí... (una frase por línea)"
        class="lyric-input">
      </textarea>
    </div>

    <!-- Área de Audio -->
    <div class="audio-selection">
      <div class="file-drop-zone">
        <input type="file" (change)="onFileSelected($event)" accept="audio/*" id="audioFile">
        <label for="audioFile">
          <strong>Seleccionar Audio MP3</strong>
          <span>o arrastra el archivo aquí</span>
        </label>
      </div>
      <p *ngIf="audioNombre" class="file-ready">✅ {{ audioNombre }}</p>
    </div>

    <button class="btn-primary-sync" (click)="irASincronizar()">
      Siguiente: Comenzar TAP
    </button>
  </div>


<!-- PANTALLA DE SINCRONIZACIÓN (PASO 2) -->
<div class="editor-card sync-mode" *ngIf="paso === 2">
  <div class="sync-header">
    <h3>Sincronizando: {{ audioNombre }}</h3>
    <progress [value]="indiceFrase" [max]="frases.length"></progress>
  </div>

  <div class="display-frase">
    <p class="label">Frase actual:</p>
    <h2 class="frase-texto">{{ frases[indiceFrase]?.texto || '¡Terminado!' }}</h2>
    <p class="next-frase" *ngIf="frases[indiceFrase + 1]">
      Próxima: {{ frases[indiceFrase + 1].texto }}
    </p>
  </div>

  <!-- BOTÓN GIGANTE DE TAP -->
  <div class="tap-container">
    <button class="btn-tap-sync"
            (mousedown)="marcarTiempo()"
            *ngIf="estaSincronizando">
      TAP
    </button>

    <button class="btn-primary-sync"
            (click)="comenzarTap()"
            *ngIf="!estaSincronizando">
      ▶️ Iniciar Audio y TAP
    </button>
  </div>
</div>

<div class="result-screen" *ngIf="indiceFrase >= frases.length">
  <button class="btn-download" (click)="generarJSON()">
    💾 Descargar Archivo JSON
  </button>

  <div class="preview-json">
    <pre>{{ frases | json }}</pre> <!-- Esto es para que veas los tiempos que marcaste -->
  </div>
</div>

<!-- Este es el botón que realmente guarda en la base de datos -->
<button (click)="publicarCancionNueva()" class="btn-publicar">
   Publicar Canción en el Sistema
</button>

</div>
