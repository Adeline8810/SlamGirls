<div class="shop-container">
  <div class="shop-header">
    <button class="btn-back" (click)="irAtras()">‹</button>
    <h1>Boutique</h1>
    <div class="user-balance">
      🟡 <span>{{ usuarioActual.monedas }}</span>
    </div>
  </div>

  <div class="preview-section">
    <div class="avatar-wrapper">
      <img [src]="usuarioActual.avatarUrl" class="user-avatar">
      <img *ngIf="objetoSeleccionado && tabActiva === 'avatar_pendant'"
           [src]="objetoSeleccionado.imagenUrl" class="frame-overlay">
    </div>
    <p class="preview-name">{{ usuarioActual.username }}</p>
    <p class="preview-status" *ngIf="objetoSeleccionado">Aperçu du {{ objetoSeleccionado.nombre }}</p>
  </div>

  <div class="shop-tabs">
    <button *ngFor="let tab of ['populares', 'avatar_pendant', 'user_decoration', 'sound_effect']"
            [class.active]="tabActiva === tab" (click)="cambiarTab(tab)">
      {{ tab.replace('_', ' ') | titlecase }}
    </button>
  </div>

  <div class="gifts-grid">
    <div class="gift-card" *ngFor="let item of productosFiltrados"
         (click)="seleccionarObjeto(item)" [class.selected]="objetoSeleccionado === item">
      <div class="gift-img-container">
        <img [src]="item.imagenUrl" [alt]="item.nombre">
      </div>
      <div class="gift-info">
        <p class="name">{{ item.nombre }}</p>
        <p class="price">🟡 {{ item.precio }}</p>
      </div>
      <div class="new-badge" *ngIf="item.esNuevo">NEW</div>
    </div>
  </div>

  <div class="shop-footer" *ngIf="objetoSeleccionado">
    <div class="footer-details">
      <img [src]="objetoSeleccionado.imagenUrl">
      <span>{{ objetoSeleccionado.nombre }}</span>
    </div>
    <button class="btn-buy" (click)="comprarObjeto()"
            [disabled]="usuarioActual.monedas < objetoSeleccionado.precio">
      Acheter ({{ objetoSeleccionado.precio }} 🟡)
    </button>
  </div>
</div>
