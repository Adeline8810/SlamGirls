<div class="profile-container">
  <header class="header-carousel">
    <div class="carousel-wrapper">
      <div class="carousel-track">
        <img [src]="fotoUrlServidor" class="carousel-bg">
        <div class="carousel-overlay"></div>
      </div>
      <div class="carousel-nav">
        <span class="arrow">❯❯❯</span>
      </div>
    </div>

    <div class="avatar-crown-wrapper">
      <div class="photo-circle">
        <img [src]="fotoUrlServidor" class="profile-img">
      </div>
      <div class="crown-layer" *ngIf="objetoSeleccionado">
        <img [src]="objetoSeleccionado.imagenUrl"
             [style.transform]="obtenerEscala(objetoSeleccionado.id)">
      </div>
    </div>

    <div class="user-details">
      <h2 class="username">@{{ usuarioActual.username }}</h2>
      <div class="chips-container">
        <span class="chip">Géminis</span>
        <span class="chip">Técnico en Informática</span>
        <span class="chip">Adaptable</span>
      </div>
    </div>
  </header>

  <div class="section-divider"></div>

  <main class="content-sector">
    <nav class="action-buttons">
      <button class="btn-item pink" (click)="irA('quiz')">
        Remplis Quiz <span class="chevron">›</span>
      </button>
      <button class="btn-item gold" (click)="irA('amigo')">
        Trouve un ami <span class="chevron">›</span>
      </button>
      <button class="btn-item purple" (click)="irA('tienda')">
        Tienda <span class="chevron">›</span>
      </button>
    </nav>

    <section class="video-section">
      <div class="section-header">
        <h3>Mes Vidéos (Récents)</h3>
        <span class="play-all">▶ Play all</span>
      </div>

      <div class="video-grid">
        <div class="video-card" *ngFor="let video of misVideos" (click)="verVideo(video)">
          <div class="thumb-container">
            <img [src]="video.thumb" class="video-thumb">
            <span class="video-duration">{{ video.duration }}</span>
            <div class="play-overlay">▶</div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
