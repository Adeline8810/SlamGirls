<div class="recharge-main">
  <!-- Cabecera y saldo actual -->
  <div class="recharge-header">
    <button class="btn-back" (click)="irAtras()"> < </button>
    <h1>Centre de Recharge</h1>
  </div>

  <div class="balance-card">
    <p class="label">Solde du compte</p>
    <div class="amount-row">
      <span class="coin-big">🟡</span>
      <span class="number">{{ usuarioActual.monedas }}</span>
    </div>
  </div>

  <p class="section-title">Payer avec PayPal</p>

  <div class="coins-grid">
    <!-- Opción 1 -->
    <div class="coin-item" (click)="prepararPago(301, 3.99)" [class.selected]="montoSeleccionado === 3.99">
      <div class="badge">Get VIP</div>
      <div class="coin-info"><span class="coin-small">🟡</span> 301</div>
      <div class="price">$ 3.99</div>
    </div>

    <!-- Opción 2 -->
    <div class="coin-item" (click)="prepararPago(762, 9.99)" [class.selected]="montoSeleccionado === 9.99">
      <div class="coin-info"><span class="coin-small">🟡</span> 762</div>
      <div class="price">$ 9.99</div>
    </div>
  </div>

  <!-- CONTENEDOR DEL BOTÓN DE PAYPAL -->
  <!-- Añadimos una instrucción para el usuario -->
  <div *ngIf="montoSeleccionado > 0" style="text-align: center; margin-top: 20px;">
    <p style="color: #ffd700; font-weight: bold;">Payer ${{ montoSeleccionado }} USD pour {{ monedasAEntregar }} coins</p>
    <div id="paypal-button-container" style="margin-top: 10px; padding: 10px;"></div>
  </div>
</div>
