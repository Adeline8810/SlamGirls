<div class="search-container">
  <!-- Barra de búsqueda superior -->
  <div class="search-header">
    <button class="back-btn" (click)="irAtras()">←</button>
    <div class="search-input-wrapper">
      <input type="text" placeholder="Buscar canciones o artistas..." (input)="buscar($event)">
      <span class="clear-icon">×</span>
    </div>
  </div>

  <!-- Lista de resultados (Estilo StarMaker) -->
  <div class="songs-list">
    <!-- Canción principal destacada -->
    <div class="song-item featured">
      <img src="assets/img/portada-ejemplo.jpg" class="song-cover">
      <div class="song-info">
        <h4>Luz de Luna</h4>
        <p>Sailor Moon • 22.0k grabaciones</p>
        <span class="points-tag">Points</span>
      </div>
      <button class="btn-chanter" (click)="seleccionarCancion('luz-de-luna')">CHANTER</button>
    </div>

    <!-- Otras canciones -->
    <div class="song-item">
      <img src="assets/img/portada-2.jpg" class="song-cover-mini">
      <div class="song-info">
        <h4>Pedazo de Luna</h4>
        <p>Andre Silvia</p>
      </div>
      <button class="btn-chanter-mini" (click)="seleccionarCancion('pedazo-luna')">CHANTER</button>
    </div>
  </div>
</div><p>buscar-cancion works!</p>
