<div class="search-container">
  <!-- Barra de búsqueda superior -->
  <div class="search-header">
    <button class="back-btn" (click)="irAtras()">←</button>
    <div class="search-input-wrapper">
      <input
        type="text"
        placeholder="Buscar canciones o artistas..."
        [(ngModel)]="terminoBusqueda"
        (input)="filtrar()">
      <span class="clear-icon" *ngIf="terminoBusqueda" (click)="terminoBusqueda = ''; filtrar()">×</span>
    </div>
  </div>

  <!-- Lista de resultados Dinámica -->
  <div class="songs-list">

    <!-- Este bloque se repite por cada canción en tu base de datos -->
    @for (cancion of cancionesFiltradas; track cancion.id) {
      <div class="song-item" [class.featured]="$first">
        <!-- Imagen desde Cloudinary o una por defecto -->
        <img [src]="cancion.urlImagen || 'assets/img/disco_cover.png'" class="song-cover">

        <div class="song-info">
          <h4>{{ cancion.titulo }}</h4>
          <p>{{ cancion.artista }} • {{ cancion.grabaciones || 0 }} grabaciones</p>
          <span class="points-tag" *ngIf="cancion.tienePuntaje">Points</span>
        </div>

        <!-- Botón que lleva al Karaoke con la data real -->
        <button
          [class]=" $first ? 'btn-chanter' : 'btn-chanter-mini' "
          (click)="irACantar(cancion)">
          CHANTER
        </button>
      </div>
    } @empty {
      <!-- Si no hay resultados -->
      <div class="empty-state">
        <p>No se encontraron canciones.</p>
        <button class="btn-primary" (click)="irAlEditor()">¡Sube una tú mismo!</button>
      </div>
    }

  </div>
</div>
