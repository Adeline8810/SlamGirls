<div class="search-page">
  <div class="search-header">
    <h2>Encuentra a otros usuariosssssssssssss 🌟</h2>
    <div class="search-input-wrapper">
      <input
        type="text"
        [(ngModel)]="busqueda"
        placeholder="Escribe nombre o @usuario..."
        (keyup.enter)="buscar()">
      <button (click)="buscar()" [disabled]="cargando()">
        {{ cargando() ? '...' : 'Buscar' }}
      </button>
    </div>
  </div>

  <div class="results-container">
    @for (user of usuarios(); track user.username) {
      <div class="user-item" (click)="verPerfil(user.username)">
        <div class="avatar-wrapper">
          <img [src]="user.fotoUrl || 'assets/default-avatar.png'" alt="Avatar">
        </div>
        <div class="user-details">
          <span class="full-name">{{ user.nombre }}</span>
          <span class="handle">@{{ user.username }}</span>
        </div>
        <div class="action-icon">
          <span>❯</span>
        </div>
      </div>
    } @empty {
      <p class="empty-msg" *ngIf="!cargando() && busqueda">No se encontraron usuarios</p>
    }
  </div>
</div>
