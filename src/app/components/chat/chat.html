<div class="chat-container">
  <div class="chat-header">
    <button (click)="volver()" style="background:none; border:none; color:white; margin-right:10px;">⬅</button>
    <strong>{{ receptorNombre }}</strong>
  </div>

  <div class="messages-list">
    @for (msg of mensajes(); track msg) {
      <div class="bubble" [ngClass]="{'me': msg.soyYo, 'other': !msg.soyYo}">
        {{ msg.texto }}
        <small style="display:block; font-size:0.6rem; opacity:0.6; text-align:right;">{{ msg.hora }}</small>
      </div>
    }
  </div>

  <div class="chat-input-area">
    <input type="text" [(ngModel)]="nuevoMensaje" placeholder="Escribe un mensaje..." (keyup.enter)="enviarMensaje()">
    <button class="btn-send" (click)="enviarMensaje()">➤</button>
  </div>
</div>
