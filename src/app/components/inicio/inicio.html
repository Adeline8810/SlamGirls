<div class="home-container">
  <!-- HEADER: Fête / Direct -->
  <div class="top-nav">
    <span class="active">Fête</span>
    <span>Direct</span>
    <div class="icons-right">🔍 🚩 📅</div>
  </div>

  <!-- SECCIÓN 1: CIRCULITOS DE LIVES -->
  <div class="lives-bar">
    <!-- Botón Crear -->
    <div class="live-item" [routerLink]="['/cantar', usuarioId]">
      <div class="circle-add">+</div>
      <span>Créer</span>
    </div>

    <!-- Círculos de usuarios en Live -->
    @for (live of listaLives; track live.id) {
      <div class="live-item">
        <div class="avatar-ring">
          <img [src]="live.thumbnailUrl || 'assets/img/default.png'">
          <div class="live-tag">DIRECT</div>
        </div>
        <span class="user-name">{{ live.titulo }}</span>
      </div>
    }
  </div>

  <!-- SECCIÓN 2: BOTONES DE CATEGORÍA (Chanter, Discuter...) -->
  <div class="category-buttons">
    <div class="cat-btn pink">🎤 Chanter</div>
    <div class="cat-btn orange">💬 Discuter</div>
    <div class="cat-btn blue">🎮 Jouer</div>
  </div>

  <!-- SECCIÓN 3: RECOMMANDÉ (Cuadrícula de salas) -->
  <h3 class="section-title">Recommandé</h3>
  <div class="rooms-grid">
    @for (video of listaVideos; track video.id) {
      <div class="room-card">
        <div class="card-image" [style.backgroundImage]="'url(' + video.miniaturaUrl + ')'">
          <div class="room-info">
            <span class="room-title">{{ video.titulo }}</span>
            <div class="room-footer">
              <img [src]="video.usuarioFoto" class="mini-avatar">
              <span class="viewers">👤 6</span>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
