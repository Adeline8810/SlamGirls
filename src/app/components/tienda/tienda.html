<div class="shop-container">
  <header class="shop-header">
    <button class="btn-back" (click)="irAtras()">‹</button>
    <h1 class="header-title">Boutique de Cadeaux</h1>
    <div class="user-balance">
      🟡 <span>{{ usuarioActual.monedas }}</span>
    </div>
  </header>

  <section class="preview-section">
    <div class="avatar-wrapper">
      <img [src]="usuarioActual.avatarUrl" class="user-photo">
      <img *ngIf="objetoSeleccionado && tabActiva === 'avatar_pendant'"
           [src]="objetoSeleccionado.imagenUrl"
           class="pendant-frame"
           [style.transform]="obtenerEscala(objetoSeleccionado.id)">
    </div>
    <p class="user-name">{{ usuarioActual.username }}</p>
  </section>

  <nav class="category-tabs">
    <div class="tab-item" [class.active]="tabActiva === 'populares'" (click)="cambiarTab('populares')">Populaires</div>
    <div class="tab-item" [class.active]="tabActiva === 'avatar_pendant'" (click)="cambiarTab('avatar_pendant')">Avatar Pendant</div>
    <div class="tab-item" [class.active]="tabActiva === 'user_decoration'" (click)="cambiarTab('user_decoration')">User Decoration</div>
  </nav>

  <main class="shop-body">
    <div class="products-grid">
      <div class="product-card" *ngFor="let item of productosFiltrados"
           (click)="seleccionarObjeto(item)" [class.selected]="objetoSeleccionado === item">
        <div class="new-tag" *ngIf="item.esNuevo">NEW</div>
        <div class="img-container">
          <img [src]="item.imagenUrl" class="product-img">
        </div>
        <p class="product-label">{{ item.nombre }}</p>
        <div class="product-price">🟡 {{ item.precio }}</div>
      </div>
    </div>
  </main>

  <footer class="purchase-footer" *ngIf="objetoSeleccionado">
    <div class="selection-details">
      <img [src]="objetoSeleccionado.imagenUrl" class="mini-preview">
      <span class="selection-name">{{ objetoSeleccionado.nombre }}</span>
    </div>
    <button class="buy-button" (click)="comprarObjeto()"
            [disabled]="usuarioActual.monedas < objetoSeleccionado.precio">
      Acheter ({{ objetoSeleccionado.precio }} 🟡)
    </button>
  </footer>
</div>
