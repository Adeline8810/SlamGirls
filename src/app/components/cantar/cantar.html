<div class="karaoke-container">

  <!-- 1. Cabecera con instrucciones o título -->
  <div class="cantar-header">
    <h2>🎤 Sala de Grabación</h2>
    <p *ngIf="!grabando">Prepárate, ajusta tus audífonos y pulsa Comenzar.</p>
    <p *ngIf="grabando" class="recording-status">🔴 Grabando con efecto Palo Rosa...</p>
  </div>

  <!-- 2. Área de Letras (Donde ocurre la magia visual) -->
  <div class="letras-box">
    <!-- Aquí va tu lógica de letras que ya tienes implementada -->
    <p class="letra-actual">{{ letraActual }}</p>
    <p class="letra-siguiente">{{ letraSiguiente }}</p>
  </div>

  <!-- 3. Panel de Control (Botones) -->
<!-- 3. Panel de Control (Botones) -->
  <div class="controles">

    <!-- BOTÓN INICIAR: Solo aparece cuando NO estás grabando -->
    <button *ngIf="!grabando"
            class="btn-comenzar"
            (click)="iniciar()">
      ▶️ Comenzar a Cantar
    </button>

    <!-- BOTÓN FINALIZAR: Solo aparece cuando SÍ estás grabando -->
    <button *ngIf="grabando"
            class="btn-finalizar"
            (click)="finalizarCanto()">
      ⏹️ Finalizar y Guardar
    </button>

  </div>

  <!-- 4. Overlay de carga (Opcional pero recomendado) -->
  <!-- Esto evita que el usuario toque cosas mientras el audio se sube a Cloudinary -->
  <div class="loading-overlay" *ngIf="cargandoSubida">
    <div class="spinner"></div>
    <p>Subiendo tu obra de arte a la nube...</p>
  </div>

  <!-- ========================================== -->
  <!-- NUEVA SECCIÓN: MIS GRABACIONES (AQUÍ VA)   -->
  <!-- ========================================== -->
  <hr class="divisor-palo-rosa" *ngIf="listaDeCantos.length > 0">

  <div class="mis-covers-seccion" *ngIf="listaDeCantos.length > 0">
    <h3 class="titulo-galeria">🎙️ Mis Covers Guardados</h3>

    <div class="grid-covers">
      <div *ngFor="let canto of listaDeCantos" class="card-audio">
        <div class="card-info">
          <span class="id-grabacion">#{{canto.id}}</span>
          <small class="fecha-label">Reciente</small>
        </div>

        <audio controls class="reproductor-palo-rosa">
          <source [src]="canto.urlAudio" type="audio/wav">
        </audio>
      </div>
    </div>
  </div>

</div>
