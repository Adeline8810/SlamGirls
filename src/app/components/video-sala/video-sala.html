<div class="live-container">

  <!-- ESTADO: CARGANDO -->
  <div *ngIf="!isJoined" class="loading-overlay">
    <div class="spinner"></div>
    <p>Entrando al directo de {{ roomName }}...</p>
  </div>

  <!-- PANTALLA DE VIDEO -->
  <div *ngIf="isJoined" class="video-wrapper">

    <!-- Badge de "En Vivo" -->
    <div class="live-badge">
      <div class="dot"></div>
      <span>EN DIRECTO: {{ roomName }}</span>
    </div>

    <!-- Video Remoto (El que ve el Usuario 2) -->
    <video #remoteVideo autoplay playsinline [muted]="modo === 'streamer'"></video>

    <!-- Botones de Interacción -->
    <div class="controls-overlay">
      <button (click)="salir()" class="btn-exit">Salir</button>
    </div>

    <!-- Mensaje si no hay señal aún -->
    <div *ngIf="!conectado && modo === 'viewer'" class="no-signal">
      <p>Esperando señal de la streamer...</p>
    </div>
  </div>

</div>
